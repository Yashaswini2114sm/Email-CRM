services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: email-crm-api
    env: docker
    region: ohio
    plan: free
    dockerCommand: uvicorn src.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false # Paste Supabase URL in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false # Paste OpenAI key in Render Dashboard
      - key: SECRET_KEY
        generateValue: true # Secure random string

  # 2. React Frontend (Static Site)
  - type: web
    name: email-crm-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://email-crm-api.onrender.com
